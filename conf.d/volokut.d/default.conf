server {
  listen 80;
  server_name volokut.ru www.volokut.ru;
  return 301 https://$server_name$request_uri;
}

server {
  listen 443 ssl;
  server_name volokut.ru www.volokut.ru;
  
  ssl_certificate /etc/letsencrypt/live/volokut.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/volokut.ru/privkey.pem;
  
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  
  location / {
    proxy_pass http://volokut-fe-app:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  
  location /hooks/ {
    proxy_pass http://volokut-webhook:9000/hooks/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}