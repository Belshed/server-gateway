resolver 127.0.0.11 valid=30s ipv6=off;

server {
  listen 5433 ssl;

  set $postgres_backend "angels-shop-postgres:5432";
  proxy_pass $postgres_backend;
  
  ssl_certificate /etc/letsencrypt/live/angels-shop.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/angels-shop.ru/privkey.pem;
  
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  
  proxy_connect_timeout 30s;
  proxy_timeout 30s;
  proxy_buffer_size 16k;
}