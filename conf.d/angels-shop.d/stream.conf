upstream postgres_angels {
  server angels-shop-postgres:5432;
}

server {
  listen 5433 ssl;
  proxy_pass postgres_angels;
  
  ssl_certificate /etc/letsencrypt/live/angels-shop.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/angels-shop.ru/privkey.pem;
  
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  
  proxy_connect_timeout 30s;
  proxy_timeout 30s;
  proxy_buffer_size 16k;
}